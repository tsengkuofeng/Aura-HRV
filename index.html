<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro Web</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; text-align: center; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column;}
        .modal-content { background: #222; padding: 25px; border-radius: 10px; max-width: 400px; width: 90%; }
        button { background: #00aa00; color: white; border: none; padding: 12px; font-size: 1em; border-radius: 5px; cursor: pointer; margin: 5px; width: 100%; font-weight: bold;}
        button.btn-blue { background: #0077ff; }
        button.btn-orange { background: #ff7700; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }

        #dashboard { display: none; padding: 10px; }
        #video-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; border: 2px solid #444; border-radius: 10px; overflow: hidden; }
        video { width: 100%; transform: scaleX(-1); display: block; } /* 鏡像翻轉 */
        #target-box { position: absolute; top: 20%; left: 35%; width: 30%; height: 20%; border: 2px solid #00ffcc; box-sizing: border-box; pointer-events: none;}

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 15px auto; }
        .stat-box { background: #333; padding: 15px; border-radius: 8px; }
        .stat-val { font-size: 1.8em; color: #00ffcc; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="disclaimer" class="modal">
        <div class="modal-content">
            <h2 style="color: #00aa00;">⚕ Aura HRV</h2>
            <p style="font-size: 0.9em; text-align: left; background:#111; padding:10px; border-radius:5px;">
                本系統採本地即時運算，絕不外洩影像。請允許使用您的攝影機。
            </p>
            <p id="loading-text" style="color: yellow;">📥 正在載入 AI 引擎 (約需10秒)...</p>
            <button id="btn-agree" style="display:none;" onclick="showModeSelection()">✅ 同意並啟動攝影機</button>
        </div>
    </div>

    <div id="mode-selection" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>選擇運行模式</h2>

            <button onclick="startApp('Public Mode', false)">👥 一般模式 (免配對)</button>
            <hr style="border-color: #444; margin: 20px 0;">

            <h3 style="color: #0077ff;">專屬模式 (本地記憶)</h3>
            <select id="profile-selector"></select>
            <button class="btn-blue" onclick="startExclusive()">🎯 開啟專屬模式</button>
            <button class="btn-orange" onclick="startTraining()">🏋️ 啟動訓練 (需Polar)</button>

            <hr style="border-color: #444; margin: 20px 0;">
            <input type="text" id="new-profile-name" placeholder="輸入新名稱以建立專屬檔案">
            <button onclick="createNewProfile()" style="background: #555;">➕ 新增專屬檔案</button>
        </div>
    </div>

    <div id="dashboard">
        <h3 id="current-mode-label" style="color: #00ffcc; margin: 5px;">Mode</h3>
        <button id="btn-polar" onclick="connectPolar()" style="background: #444; width: auto; padding: 5px 15px; font-size: 0.9em;">🔗 連線 Polar H10</button>
        <span id="polar-bpm" style="color: #00ffcc; font-weight: bold; margin-left: 10px;">-- BPM</span>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="target-box"></div> <canvas id="hidden-canvas" style="display:none;"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-box">AI BPM<span id="ai-bpm" class="stat-val">--</span></div>
            <div class="stat-box">Buffer<span id="ai-buffer" class="stat-val" style="color:#aaa; font-size: 1.2em;">0 / 300</span></div>
            <div class="stat-box">RMSSD<span id="ai-rmssd" class="stat-val" style="color: orange;">--</span></div>
            <div class="stat-box">SDNN<span id="ai-sdnn" class="stat-val" style="color: orange;">--</span></div>
        </div>
    </div>

    <script>
        let pyodideInstance;
        let pyProcessData, pySyncProfiles, pyExportProfiles;

        let rgbBuffer = [];
        let polarBpm = 0;
        let isTraining = false;
        let currentProfile = "Public Mode";
        let localProfiles = {};

        // === 初始化與記憶庫讀取 ===
        window.onload = async () => {
            // 從手機讀取記憶
            const saved = localStorage.getItem('aura_profiles');
            if (saved) localProfiles = JSON.parse(saved);

            try {
                pyodideInstance = await loadPyodide();
                await pyodideInstance.loadPackage(['numpy', 'scipy']);
                const code = await (await fetch('./aura_engine.py')).text();
                await pyodideInstance.runPythonAsync(code);

                pyProcessData = pyodideInstance.globals.get('process_data_from_js');
                pySyncProfiles = pyodideInstance.globals.get('sync_profiles');
                pyExportProfiles = pyodideInstance.globals.get('export_profiles');

                // 將手機記憶同步給 Python
                if(saved) pySyncProfiles(saved);

                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('btn-agree').style.display = 'block';
            } catch (err) {
                document.getElementById('loading-text').innerText = "❌ 引擎載入失敗，請重新整理";
            }
        };

        // === 介面切換邏輯 ===
        function showModeSelection() {
            document.getElementById('disclaimer').style.display = 'none';
            document.getElementById('mode-selection').style.display = 'flex';
            updateProfileDropdown();
        }

        function updateProfileDropdown() {
            const select = document.getElementById('profile-selector');
            select.innerHTML = "";
            for (let name in localProfiles) {
                if (name !== "Public Mode") {
                    let opt = document.createElement('option');
                    opt.value = name; opt.innerHTML = name;
                    select.appendChild(opt);
                }
            }
            if(select.options.length === 0) {
                let opt = document.createElement('option');
                opt.innerHTML = "尚未建立專屬檔案"; opt.disabled = true;
                select.appendChild(opt);
            }
        }

        function createNewProfile() {
            const name = document.getElementById('new-profile-name').value.trim();
            if(name && !localProfiles[name]) {
                localProfiles[name] = { "c_R": 3.0, "c_G": 2.0, "baseline_bpm": 75.0, "trained": True };
                localStorage.setItem('aura_profiles', JSON.stringify(localProfiles));
                pySyncProfiles(JSON.stringify(localProfiles));
                updateProfileDropdown();
                document.getElementById('new-profile-name').value = "";
                alert(`✅ 成功建立: ${name}`);
            } else {
                alert("請輸入有效或不重複的名稱！");
            }
        }

        function startExclusive() {
            const name = document.getElementById('profile-selector').value;
            if(name) startApp(name, false);
        }

        function startTraining() {
            const name = document.getElementById('profile-selector').value;
            if(!name) { alert("請先建立並選擇一個專屬檔案！"); return; }
            alert("請確保已配戴 Polar 藍牙心跳帶。");
            startApp(name, true);
        }

        // === 啟動主程式與攝影機 ===
        async function startApp(modeName, trainingFlag) {
            currentProfile = modeName;
            isTraining = trainingFlag;

            document.getElementById('mode-selection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            let modeTitle = (modeName === "Public Mode") ? "👥 一般大眾模式" : `🎯 專屬模式: ${modeName}`;
            if(isTraining) modeTitle = `🏋️ 訓練中: ${modeName}`;
            document.getElementById('current-mode-label').innerText = modeTitle;

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            const video = document.getElementById('webcam');
            video.srcObject = stream;
            video.play();

            requestAnimationFrame(processFrame);
        }

        // === 影像處理與大腦溝通 ===
        function processFrame() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                // 注意：影像在 UI 上被鏡像了，但擷取數據不影響
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 只抓取額頭區域 (目標框大約在畫面上方居中)
                const w = canvas.width, h = canvas.height;
                const roiX = w * 0.35, roiY = h * 0.20, roiW = w * 0.30, roiH = h * 0.20;

                const frameData = ctx.getImageData(roiX, roiY, roiW, roiH).data;
                let r=0, g=0, b=0;
                for(let i=0; i<frameData.length; i+=4) {
                    r += frameData[i]; g += frameData[i+1]; b += frameData[i+2];
                }
                const count = frameData.length / 4;
                rgbBuffer.push([r/count, g/count, b/count]);

                if (rgbBuffer.length > 300) {
                    rgbBuffer.shift();
                    // 每秒 (約 30 幀) 算一次，減少瀏覽器負擔
                    if (rgbBuffer.length % 30 === 0) {
                        // 呼叫 Python 大腦
                        const result = pyProcessData(rgbBuffer.flat(), 30.0, polarBpm, currentProfile, isTraining).toJs();

                        document.getElementById('ai-bpm').innerText = result.get('bpm') || "--";
                        document.getElementById('ai-rmssd').innerText = result.get('rmssd') || "--";
                        document.getElementById('ai-sdnn').innerText = result.get('sdnn') || "--";

                        // 如果是訓練模式，儲存新學習到的參數回手機
                        if (isTraining && polarBpm > 30) {
                            const updatedProfilesJson = pyExportProfiles();
                            localStorage.setItem('aura_profiles', updatedProfilesJson);
                        }
                    }
                }
                document.getElementById('ai-buffer').innerText = `${rgbBuffer.length} / 300`;
            }
            requestAnimationFrame(processFrame);
        }

        // === 藍牙連線 ===
        async function connectPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const characteristic = await service.getCharacteristic('heart_rate_measurement');
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const value = e.target.value;
                    polarBpm = (value.getUint8(0) & 0x1) ? value.getUint16(1, true) : value.getUint8(1);
                    document.getElementById('polar-bpm').innerText = polarBpm + " BPM";
                });
                document.getElementById('btn-polar').innerText = "✅ Polar 連線成功";
                document.getElementById('btn-polar').disabled = true;
            } catch (err) { alert("藍牙連線失敗: " + err); }
        }
    </script>
</body>
</html>
